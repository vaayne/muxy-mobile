name: iOS Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
  push:
    branches: [main]
    paths:
      - "ios/**"

concurrency:
  group: ios-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: iOS
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi

      - name: Run iOS checks
        run: ios/scripts/checks.sh
